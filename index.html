<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>:3 e-boy doom x jay shipping calc :3</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <span class="bg-star bg-star-1">✦</span>
    <span class="bg-star bg-star-2">★</span>
    <span class="bg-star bg-star-3">✦</span>
    <span class="bg-star bg-star-4">☆</span>
    <svg class="bg-heart bg-heart-1" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><path d="M16 28s-10-6.5-10-14a6 6 0 0 1 10-4 6 6 0 0 1 10 4c0 7.5-10 14-10 14z"/></svg>
    <svg class="bg-heart bg-heart-2" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><path d="M16 28s-10-6.5-10-14a6 6 0 0 1 10-4 6 6 0 0 1 10 4c0 7.5-10 14-10 14z"/></svg>
    <svg class="bg-heart bg-heart-3" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><path d="M16 28s-10-6.5-10-14a6 6 0 0 1 10-4 6 6 0 0 1 10 4c0 7.5-10 14-10 14z"/></svg>
    <svg class="bg-heart bg-heart-4" viewBox="0 0 32 32" fill="currentColor" aria-hidden="true"><path d="M16 28s-10-6.5-10-14a6 6 0 0 1 10-4 6 6 0 0 1 10 4c0 7.5-10 14-10 14z"/></svg>
    <span class="bg-face bg-face-1">:3</span>
    <span class="bg-face bg-face-2">:3</span>
    <span class="bg-face bg-face-3">:3</span>
    <span class="bg-chain bg-chain-1">⛓</span>
    <span class="bg-chain bg-chain-2">⛓</span>
    <div class="paw-prints paw-prints--global">
      <svg class="paw paw-1" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-2" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-3" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-4" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-5" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-6" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-7" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-8" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-9" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-10" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-11" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
      <svg class="paw paw-12" viewBox="0 0 64 64" fill="currentColor"><ellipse cx="32" cy="44" rx="14" ry="12"/><circle cx="18" cy="24" r="7"/><circle cx="32" cy="18" r="7"/><circle cx="46" cy="24" r="7"/><circle cx="52" cy="36" r="6"/><circle cx="12" cy="36" r="6"/></svg>
    </div>
  </div>

  <main class="splash" id="splash">
    <div class="content">
      <p class="splash-tag">~ e-boy kawaii shipping calc :3 ~</p>
      <h1 class="title">
        doom &amp; jay...
        <span class="title-sub">are they meant to be? :3</span>
      </h1>
      <button class="play-btn" type="button" aria-label="Play">
        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
    </div>
  </main>

  <main class="avatars-screen hidden" id="avatars-screen">
    <div class="avatars-layout">
      <div class="avatar-card avatar-card--jay">
        <div class="avatar-frame">
          <img src="assets/jay-kawaii.png" alt="Jay in kawaii anime style" class="avatar-img">
        </div>
        <p class="avatar-name">Jay</p>
      </div>

      <div class="avatars-center">
        <button class="start-shipping-btn" id="start-shipping-btn" type="button"><span class="btn-heart">&lt;3</span> start shipping :3 <span class="btn-heart">&lt;3</span></button>
      </div>

      <div class="avatar-card avatar-card--doom">
        <div class="avatar-frame">
          <img src="assets/doom-kawaii.png" alt="Doom in kawaii anime style" class="avatar-img">
        </div>
        <p class="avatar-name">Doom</p>
      </div>
    </div>
  </main>

  <main class="quiz-screen hidden" id="quiz-screen">
    <div class="quiz-container">
      <p class="quiz-progress" id="quiz-progress">Question 1 of 10</p>
      <h2 class="quiz-question" id="quiz-question"></h2>
      <div class="quiz-options" id="quiz-options"></div>
    </div>
  </main>

  <main class="results-screen hidden" id="results-screen">
    <div class="results-layout">
      <div class="result-card result-card--jay">
        <div class="avatar-frame avatar-frame--small">
          <img src="assets/jay-kawaii.png" alt="Jay" class="avatar-img">
        </div>
        <p class="result-speech result-speech--jay" id="jay-reaction">...</p>
      </div>

      <div class="results-center">
        <p class="results-label">ship percentage</p>
        <p class="results-percent" id="shipping-percent">0%</p>
        <p class="results-verdict" id="results-verdict"></p>
      </div>

      <div class="result-card result-card--doom avatar-card--doom">
        <div class="avatar-frame avatar-frame--small avatar-frame--doom">
          <img src="assets/doom-kawaii.png" alt="Doom" class="avatar-img">
        </div>
        <p class="result-speech result-speech--doom" id="doom-reaction">...</p>
      </div>
    </div>
    <button class="retry-btn" id="retry-btn" type="button"><span class="btn-heart">&lt;3</span> ship them again :3 <span class="btn-heart">&lt;3</span></button>
  </main>

  <script src="script.js"></script>
</body>
</html>
